<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Blocked - MoreTime</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    h1 {
      color: #333;
      font-size: 32px;
      margin-bottom: 16px;
      font-weight: 700;
    }

    .message {
      color: #666;
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .info-box {
      background: #f5f7fa;
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0;
      border-left: 4px solid #667eea;
    }

    .info-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #e0e0e0;
    }

    .info-item:last-child {
      border-bottom: none;
    }

    .info-label {
      color: #666;
      font-weight: 500;
    }

    .info-value {
      color: #333;
      font-weight: 600;
    }

    .time-remaining {
      font-size: 24px;
      color: #667eea;
      font-weight: 700;
      margin-top: 10px;
    }

    .description {
      color: #888;
      font-size: 14px;
      margin-top: 20px;
      font-style: italic;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.7;
      }
    }

    .icon {
      animation: pulse 2s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🚫</div>
    <h1>Website Blocked</h1>
    <p class="message">This website is currently blocked by MoreTime.</p>
    
    <div class="info-box">
      <div class="info-item">
        <span class="info-label">Blocking Rule:</span>
        <span class="info-value" id="rule-name">Loading...</span>
      </div>
      <div class="info-item">
        <span class="info-label">Schedule Type:</span>
        <span class="info-value" id="schedule-type">Loading...</span>
      </div>
      <div class="info-item" id="time-info">
        <span class="info-label">Time Remaining:</span>
        <span class="info-value time-remaining" id="time-remaining">Loading...</span>
      </div>
    </div>

    <p class="description" id="description">You can manage your blocking rules from the MoreTime extension popup.</p>
  </div>

  <script>
    /**
     * Script for the blocked page
     * Displays blocking information and updates time remaining
     */

    // Get blocking info from URL parameters
    function getBlockInfoFromURL() {
      const params = new URLSearchParams(window.location.search);
      const ruleName = params.get('rule') || 'Unknown Rule';
      const scheduleType = params.get('scheduleType') || 'Unknown';
      const timeRemaining = params.get('timeRemaining') || 'Unknown';
      const description = params.get('description') || 'This website is blocked according to your settings.';

      return {
        ruleName: decodeURIComponent(ruleName),
        scheduleType: decodeURIComponent(scheduleType),
        timeRemaining: decodeURIComponent(timeRemaining),
        description: decodeURIComponent(description),
      };
    }

    // Format time remaining for display
    function formatTimeRemaining(timeRemaining) {
      if (timeRemaining === 'Unknown' || timeRemaining === 'N/A') {
        return 'Active';
      }
      return timeRemaining;
    }

    // Update the page with blocking information
    function updatePage() {
      const info = getBlockInfoFromURL();
      
      const ruleNameEl = document.getElementById('rule-name');
      const scheduleTypeEl = document.getElementById('schedule-type');
      const timeRemainingEl = document.getElementById('time-remaining');
      const descriptionEl = document.getElementById('description');
      
      if (ruleNameEl) ruleNameEl.textContent = info.ruleName;
      if (scheduleTypeEl) scheduleTypeEl.textContent = info.scheduleType;
      if (timeRemainingEl) timeRemainingEl.textContent = formatTimeRemaining(info.timeRemaining);
      if (descriptionEl) descriptionEl.textContent = info.description;

      // Hide time info if it's a daily schedule without specific end time
      if (info.scheduleType === 'Daily Schedule' && info.timeRemaining === 'Active') {
        const timeInfo = document.getElementById('time-info');
        if (timeInfo) {
          timeInfo.style.display = 'none';
        }
      }
    }

    // Update page on load
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', updatePage);
    } else {
      updatePage();
    }

    // Update time remaining every second for duration-based blocks
    setInterval(() => {
      const info = getBlockInfoFromURL();
      if (info.scheduleType === 'Duration Block') {
        // Try to parse and update time remaining
        // This is a simple implementation - could be enhanced
        updatePage();
      }
    }, 1000);
  </script>
</body>
</html>
