<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Blocked - MoreTime</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    h1 {
      color: #333;
      font-size: 32px;
      margin-bottom: 16px;
      font-weight: 700;
    }

    .message {
      color: #666;
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .info-box {
      background: #f5f7fa;
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0;
      border-left: 4px solid #667eea;
    }

    .info-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #e0e0e0;
    }

    .info-item:last-child {
      border-bottom: none;
    }

    .info-label {
      color: #666;
      font-weight: 500;
    }

    .info-value {
      color: #333;
      font-weight: 600;
      text-align: right;
      max-width: 65%;
    }

    .time-remaining {
      font-size: 24px;
      color: #667eea;
      font-weight: 700;
      margin-top: 10px;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.7;
      }
    }

    .icon {
      animation: pulse 2s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🚫</div>
    <h1>Website Blocked</h1>
    <p class="message">This website is currently blocked by MoreTime.</p>
    
    <div class="info-box">
      <div class="info-item">
        <span class="info-label">Blocking Rule:</span>
        <span class="info-value" id="rule-name">Loading...</span>
      </div>
      <div class="info-item">
        <span class="info-label">Blocked Because:</span>
        <span class="info-value" id="blocked-because">Loading...</span>
      </div>
      <div class="info-item" id="time-info">
        <span class="info-label">Time Remaining:</span>
        <span class="info-value time-remaining" id="time-remaining">Loading...</span>
      </div>
    </div>

  </div>

  <script src="blocked.js"></script>
</body>
</html>
